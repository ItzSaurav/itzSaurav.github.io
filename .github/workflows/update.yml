name: Update Daily AI News

on:
  schedule:
    - cron: '0 6 * * *'   # Every day at 6 AM UTC
  workflow_dispatch:       # Allow manual trigger

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v2
      with:
        fetch-depth: 0  # Fetch full git history to enable push

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: 3.x

    - name: Run fetch script
      run: |
        pip install feedparser
        python scripts/fetch_news.py

    - name: Check GH_PAT secret
      run: echo "Token length: ${#GH_PAT}"
      env:
        GH_PAT: ${{ secrets.GH_PAT }}

    - name: Commit and push changes
      env:
        GH_PAT: ${{ secrets.GH_PAT }}
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add index.html
        git status
        git diff --staged
        git commit -m "Auto-update AI news" || echo "No changes to commit"
        git remote -v
        git push https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git HEAD:main -v
